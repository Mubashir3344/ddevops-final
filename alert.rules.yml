groups:
  - name: ml_model_alerts
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.62
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ML model confidence dropped below threshold"
          description: "Prediction confidence score has been below 0.62 for more than 1 minute"
